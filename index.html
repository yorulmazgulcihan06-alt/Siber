<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NovaLearning Global | Future of Education</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --brand: #0062ff;
            --brand-soft: #eef4ff;
            --text-dark: #0f172a;
            --text-light: #64748b;
            --success: #10b981;
            --danger: #f43f5e;
            --bg: #f8fafc;
            --white: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--text-dark); overflow-x: hidden; }

        /* --- Header & Branding --- */
        nav {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            padding: 1rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid #e2e8f0;
        }
        .logo { font-weight: 800; font-size: 1.5rem; color: var(--brand); letter-spacing: -1px; }
        .user-stats { display: flex; gap: 20px; align-items: center; }
        .stat-badge { background: var(--brand-soft); color: var(--brand); padding: 0.5rem 1rem; border-radius: 12px; font-weight: 600; font-size: 0.9rem; }

        /* --- Layout --- */
        .app-grid {
            max-width: 1200px;
            margin: 2rem auto;
            display: grid;
            grid-template-columns: 1fr 380px;
            gap: 2rem;
            padding: 0 1.5rem;
        }

        /* --- Main Quiz Engine --- */
        .quiz-card {
            background: var(--white);
            border-radius: 32px;
            padding: 3rem;
            box-shadow: 0 20px 50px rgba(0,0,0,0.03);
            border: 1px solid #f1f5f9;
        }

        .category-pill {
            display: inline-block;
            background: var(--brand);
            color: white;
            padding: 4px 16px;
            border-radius: 100px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            margin-bottom: 1.5rem;
        }

        #question-body { font-size: 1.8rem; font-weight: 700; line-height: 1.3; margin-bottom: 2.5rem; color: var(--text-dark); }

        .options-list { display: grid; gap: 1rem; }
        .opt {
            padding: 1.2rem 1.5rem;
            border: 2px solid #f1f5f9;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            font-weight: 600;
            font-size: 1.1rem;
        }
        .opt:hover { border-color: var(--brand); background: var(--brand-soft); transform: translateY(-2px); }
        .opt.correct { background: #d1fae5; border-color: var(--success); color: #065f46; }
        .opt.wrong { background: #fee2e2; border-color: var(--danger); color: #991b1b; }
        .opt-prefix { width: 32px; height: 32px; background: #f1f5f9; border-radius: 8px; display: flex; align-items: center; justify-content: center; margin-right: 1rem; color: var(--brand); }

        /* --- AI Side Panel --- */
        .side-panel { display: flex; flex-direction: column; gap: 1.5rem; }
        .ai-core {
            background: var(--text-dark);
            color: white;
            border-radius: 28px;
            padding: 2rem;
            position: relative;
            overflow: hidden;
        }
        .ai-core::after { content: ''; position: absolute; top: 0; right: 0; width: 100px; height: 100px; background: var(--brand); filter: blur(80px); opacity: 0.4; }
        
        .ai-title { display: flex; align-items: center; gap: 10px; font-weight: 600; margin-bottom: 1rem; font-size: 0.9rem; color: #94a3b8; }
        #ai-response { font-size: 1rem; line-height: 1.6; color: #e2e8f0; margin-bottom: 1.5rem; min-height: 100px; }

        .action-btn {
            width: 100%;
            padding: 1rem;
            border: none;
            border-radius: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            background: var(--brand);
            color: white;
        }
        .action-btn:hover { filter: brightness(1.2); transform: scale(1.02); }

        .level-card {
            background: var(--white);
            border-radius: 24px;
            padding: 1.5rem;
            border: 1px solid #e2e8f0;
            text-align: center;
        }

        .progress-container { width: 100%; height: 8px; background: #f1f5f9; border-radius: 10px; margin: 10px 0; overflow: hidden; }
        #xp-bar { height: 100%; background: var(--brand); width: 0%; transition: width 0.5s; }

        @media (max-width: 950px) { .app-grid { grid-template-columns: 1fr; } .side-panel { order: -1; } }
    </style>
</head>
<body>

<nav>
    <div class="logo">NOVA LEARNING</div>
    <div class="user-stats">
        <div class="stat-badge">🔥 <span id="streak">0</span> Gün</div>
        <div class="stat-badge">🏆 <span id="rank">Çaylak</span></div>
    </div>
</nav>

<div class="app-grid">
    <main>
        <div class="quiz-card">
            <div id="cat" class="category-pill">ANALİZ EDİLİYOR...</div>
            <div id="question-body">Ders havuzu optimize ediliyor...</div>
            <div class="options-list" id="options"></div>
        </div>
    </main>

    <aside class="side-panel">
        <div class="level-card">
            <div style="font-size: 0.8rem; font-weight: 700; color: var(--text-light);">SEVİYE <span id="lvl">1</span></div>
            <div class="progress-container"><div id="xp-bar"></div></div>
            <div style="font-size: 0.7rem; color: var(--text-light);">Sonraki seviyeye <span id="xp-needed">100</span> XP</div>
        </div>

        <div class="ai-core">
            <div class="ai-title">🤖 NOVA AI ÇEKİRDEĞİ</div>
            <div id="ai-response">Sisteme hoş geldin CEO. Soruları senin 5. sınıf performansına göre ayarladım. Başlayalım mı?</div>
            <button class="action-btn" onclick="askAI()">İPUCU ANALİZİ</button>
        </div>
    </aside>
</div>

<script>
    // --- DATABASE (Sonsuz Havuz İçin Temel) ---
    const DB = [
        { c: "Matematik", q: "36 sayısının 4/9'u kaçtır?", o: ["12", "16", "20", "24"], a: 1, h: "Önce 36'yı 9'a böl, sonra çıkan sonucu 4 ile çarp kanka." },
        { c: "Fen Bilimleri", q: "Dünya, Güneş ve Ay'ın büyüklük sıralaması nasıldır?", o: ["Güneş > Dünya > Ay", "Dünya > Güneş > Ay", "Güneş > Ay > Dünya", "Ay > Dünya > Güneş"], a: 0, h: "Güneş en devasa olanıdır, Ay ise en küçüğü." },
        { c: "Bilişim", q: "Aşağıdakilerden hangisi bir 'Bulut Depolama' servisidir?", o: ["Photoshop", "Google Drive", "Windows 10", "Excel"], a: 1, h: "Dosyalarını internete yüklediğin bir sistem düşün." },
        { c: "Türkçe", q: "'Islak' kelimesinin zıt anlamlısı hangisidir?", o: ["Nemli", "Yaş", "Kuru", "Sıcak"], a: 2, h: "Yağmurun tam tersi durumu hayal et." },
        { c: "Matematik", q: "Bir kenarı 8 cm olan bir karenin alanı kaç cm²'dir?", o: ["16", "32", "64", "80"], a: 2, h: "Karenin alanı iki kenarın çarpımıdır (8x8)." },
        { c: "Sosyal Bilgiler", q: "Tarihte parayı bulan uygarlık hangisidir?", o: ["Hititler", "Sümerler", "Lidyalılar", "Frigler"], a: 2, h: "Ege bölgesinde yaşamış zengin tüccarlar!" },
        { c: "Fen Bilimleri", q: "Bitkilerin kendi besinlerini üretmesine ne denir?", o: ["Solunum", "Terleme", "Fotosentez", "Boşaltım"], a: 2, h: "Işık kullanarak üretim yapma süreci." },
        { c: "Bilişim", q: "Bilgisayarda 'Kes' işleminin kısayol tuşu hangisidir?", o: ["Ctrl + C", "Ctrl + V", "Ctrl + X", "Ctrl + Z"], a: 2, h: "Makas gibi düşün kanka, X harfi makasa benzemiyor mu?" }
    ];

    // --- ENGINE ---
    let state = {
        xp: parseInt(localStorage.getItem('xp')) || 0,
        lvl: 1,
        pool: [...DB],
        current: null,
        aiStage: 0
    };

    function init() {
        if (state.pool.length === 0) state.pool = [...DB];
        
        const idx = Math.floor(Math.random() * state.pool.length);
        state.current = state.pool.splice(idx, 1)[0];
        state.aiStage = 0;
        
        updateStats();
        render();
    }

    function render() {
        document.getElementById('cat').innerText = state.current.c;
        document.getElementById('question-body').innerText = state.current.q;
        document.getElementById('ai-response').innerText = "Soruyu analiz ettim. Stratejik bir ipucu için butona basabilirsin.";
        
        const opts = document.getElementById('options');
        opts.innerHTML = "";
        
        state.current.o.forEach((text, i) => {
            const div = document.createElement('div');
            div.className = 'opt';
            div.innerHTML = `<div class="opt-prefix">${String.fromCharCode(65+i)}</div> ${text}`;
            div.onclick = () => handleSelect(i, div);
            opts.appendChild(div);
        });
    }

    function handleSelect(idx, el) {
        const items = document.querySelectorAll('.opt');
        items.forEach(i => i.style.pointerEvents = 'none');

        if (idx === state.current.a) {
            el.classList.add('correct');
            state.xp += 25;
            document.getElementById('ai-response').innerText = "Analiz: Kusursuz cevap. NovaLearning algoritması seni dahi olarak sınıflandırıyor.";
        } else {
            el.classList.add('wrong');
            items[state.current.a].classList.add('correct');
            document.getElementById('ai-response').innerText = "Hata Algılandı: Sorun değil kanka, bu veriyi öğrenme havuzuna ekledim.";
        }

        localStorage.setItem('xp', state.xp);
        setTimeout(init, 2000);
    }

    function updateStats() {
        state.lvl = Math.floor(state.xp / 100) + 1;
        const currentXP = state.xp % 100;
        
        document.getElementById('lvl').innerText = state.lvl;
        document.getElementById('xp-bar').style.width = currentXP + "%";
        document.getElementById('xp-needed').innerText = 100 - currentXP;
        
        if(state.lvl > 5) document.getElementById('rank').innerText = "Uzman";
        if(state.lvl > 10) document.getElementById('rank').innerText = "Yönetici";
    }

    function askAI() {
        state.aiStage++;
        const box = document.getElementById('ai-response');
        if(state.aiStage === 1) box.innerText = "🔍 IPUCU: " + state.current.h;
        else if(state.aiStage === 2) box.innerText = "💡 DERİN ANALİZ: Doğru cevap '" + state.current.o[state.current.a] + "' gibi görünüyor, beynini kullan kanka.";
        else box.innerText = "🤖 CEO kanka, cevap '" + state.current.o[state.current.a] + "'! Hadi bas geç, vakit nakittir.";
    }

    init();
</script>

</body>
</html>
